name: Publish v0.1.38 Fork Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    if: github.repository == 'toverwu-qaq/opentypeless'
    runs-on: ubuntu-latest
    steps:
      - name: Publish fork draft release when assets are ready
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: v0.1.38
        run: |
          set -euo pipefail

          gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --draft=false
          gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json isDraft,tagName,url
