name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  check-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx eslint src/
      - run: npx prettier --check src/
      - run: npx vitest run

  check-rust:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: ubuntu-latest
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          components: clippy, rustfmt

      - uses: swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8
        with:
          workspaces: src-tauri -> target

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libasound2-dev libxdo-dev

      - run: cargo fmt --check --manifest-path src-tauri/Cargo.toml
      - run: cargo clippy --target ${{ matrix.target }} --manifest-path src-tauri/Cargo.toml -- -D warnings
      - name: Run Rust tests
        run: cargo test --target ${{ matrix.target }} --manifest-path src-tauri/Cargo.toml

      - name: Diagnose Windows loader failure
        if: failure() && matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $testExe = Get-ChildItem src-tauri/target/${{ matrix.target }}/debug/deps/opentypeless_lib-*.exe |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1
          if (-not $testExe) {
            throw "Rust test executable was not found"
          }

          Write-Host "Test executable: $($testExe.FullName)"
          Get-ComputerInfo | Select-Object WindowsProductName, WindowsVersion, OsBuildNumber

          $vswhere = "${env:ProgramFiles(x86)}/Microsoft Visual Studio/Installer/vswhere.exe"
          $vsRoot = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          $dumpbin = Get-ChildItem "$vsRoot/VC/Tools/MSVC/*/bin/Hostx64/x64/dumpbin.exe" |
            Sort-Object FullName -Descending |
            Select-Object -First 1
          if (-not $dumpbin) {
            throw "dumpbin.exe was not found"
          }

          & $dumpbin.FullName /DEPENDENTS $testExe.FullName
          & $dumpbin.FullName /IMPORTS $testExe.FullName

          Get-WinEvent -FilterHashtable @{
            LogName = 'Application'
            StartTime = (Get-Date).AddMinutes(-15)
          } -ErrorAction SilentlyContinue |
            Where-Object { $_.Message -match 'opentypeless|entry point|side-by-side' } |
            Select-Object TimeCreated, ProviderName, Id, LevelDisplayName, Message |
            Format-List

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: 'npm'

      - run: npm audit --audit-level=high

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      # wayland-scanner 0.31.10 is currently the latest release and still pins
      # quick-xml 0.39 for Wayland protocol code generation. The vulnerable XML
      # parser path is not used for runtime user input; remove these ignores once
      # wayland-scanner publishes a quick-xml >=0.41 compatible release.
      - run: cargo audit --file src-tauri/Cargo.lock --ignore RUSTSEC-2026-0194 --ignore RUSTSEC-2026-0195
