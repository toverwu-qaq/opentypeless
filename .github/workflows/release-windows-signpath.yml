name: Release Windows SignPath

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.43)'
        required: true
        default: 'v0.1.43'

permissions:
  actions: read
  contents: read

jobs:
  build-sign-publish:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Sync version from tag
        shell: bash
        run: |
          TAG_VERSION="${{ github.event.inputs.tag }}"
          VERSION="${TAG_VERSION#v}"
          echo "TAG_NAME=$TAG_VERSION" >> "$GITHUB_ENV"
          echo "APP_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "VITE_APP_VERSION=v$VERSION" >> "$GITHUB_ENV"

          node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json','utf8'));p.version='$VERSION';fs.writeFileSync('package.json',JSON.stringify(p,null,2)+'\n');"
          node -e "const fs=require('fs');const c=JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json','utf8'));c.version='$VERSION';fs.writeFileSync('src-tauri/tauri.conf.json',JSON.stringify(c,null,2)+'\n');"
          node -e "const fs=require('fs');let c=fs.readFileSync('src-tauri/Cargo.toml','utf8');c=c.replace(/^version = \".*\"/m,'version = \"$VERSION\"');fs.writeFileSync('src-tauri/Cargo.toml',c);"

      - name: Verify secrets
        shell: pwsh
        env:
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
          SIGNPATH_ORGANIZATION_ID: ${{ secrets.SIGNPATH_ORGANIZATION_ID }}
          SIGNPATH_PROJECT_SLUG: ${{ secrets.SIGNPATH_PROJECT_SLUG }}
          SIGNPATH_SIGNING_POLICY_SLUG: ${{ secrets.SIGNPATH_SIGNING_POLICY_SLUG }}
          SIGNPATH_ARTIFACT_CONFIGURATION_SLUG: ${{ secrets.SIGNPATH_ARTIFACT_CONFIGURATION_SLUG }}
        run: |
          $required = @(
            'RELEASE_TOKEN',
            'TAURI_SIGNING_PRIVATE_KEY',
            'TAURI_SIGNING_PRIVATE_KEY_PASSWORD',
            'SIGNPATH_API_TOKEN',
            'SIGNPATH_ORGANIZATION_ID',
            'SIGNPATH_PROJECT_SLUG',
            'SIGNPATH_SIGNING_POLICY_SLUG',
            'SIGNPATH_ARTIFACT_CONFIGURATION_SLUG'
          )
          foreach ($name in $required) {
            if ([string]::IsNullOrWhiteSpace([Environment]::GetEnvironmentVariable($name))) {
              Write-Error "$name is required for Windows SignPath release."
              exit 1
            }
          }

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - run: npm ci

      - name: Build unsigned Windows installers
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build --target x86_64-pc-windows-msvc --no-sign --ci

      - name: Stage unsigned installers
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path signpath-unsigned | Out-Null
          $installers = Get-ChildItem -Path src-tauri/target/x86_64-pc-windows-msvc/release/bundle -Recurse -File |
            Where-Object { $_.Extension -in '.exe', '.msi' }
          if ($installers.Count -lt 2) {
            Write-Error "Expected NSIS and MSI installers, found $($installers.Count)."
            exit 1
          }
          foreach ($installer in $installers) {
            Copy-Item -LiteralPath $installer.FullName -Destination signpath-unsigned
          }
          Get-ChildItem signpath-unsigned

      - name: Upload unsigned artifact
        id: upload-unsigned-artifact
        uses: actions/upload-artifact@v4
        with:
          name: opentypeless-windows-unsigned-${{ github.event.inputs.tag }}
          path: signpath-unsigned/*
          if-no-files-found: error

      - name: Submit SignPath signing request
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ secrets.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ secrets.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ secrets.SIGNPATH_SIGNING_POLICY_SLUG }}
          artifact-configuration-slug: ${{ secrets.SIGNPATH_ARTIFACT_CONFIGURATION_SLUG }}
          github-artifact-id: ${{ steps.upload-unsigned-artifact.outputs.artifact-id }}
          wait-for-completion: true
          wait-for-completion-timeout-in-seconds: '1800'
          output-artifact-directory: signpath-signed

      - name: Verify Authenticode signatures
        shell: pwsh
        env:
          SIGNPATH_SIGNING_POLICY_SLUG: ${{ secrets.SIGNPATH_SIGNING_POLICY_SLUG }}
        run: |
          $signed = Get-ChildItem -Path signpath-signed -Recurse -File |
            Where-Object { $_.Extension -in '.exe', '.msi' }
          if ($signed.Count -lt 2) {
            Write-Error "Expected signed NSIS and MSI installers, found $($signed.Count)."
            exit 1
          }

          $isTestSigning = $env:SIGNPATH_SIGNING_POLICY_SLUG -match '^(?i:test[-_])'
          foreach ($file in $signed) {
            $signature = Get-AuthenticodeSignature -LiteralPath $file.FullName
            if ($isTestSigning) {
              if (-not $signature.SignerCertificate) {
                Write-Error "Missing Authenticode signature for $($file.Name): $($signature.Status)"
                exit 1
              }
            } elseif ($signature.Status -ne 'Valid') {
              Write-Error "Invalid Authenticode signature for $($file.Name): $($signature.Status)"
              exit 1
            }
            Write-Host "$($file.Name): $($signature.Status); $($signature.SignerCertificate.Subject)"
          }

      - name: Publish signed Windows release assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          TAG_NAME: ${{ github.event.inputs.tag }}
          RELEASE_REPO: tover0314-w/opentypeless
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: ./.github/scripts/publish-signpath-windows-release.ps1
