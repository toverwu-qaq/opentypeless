[default.extend-words]
# Allow these "words" that typos might flag
cpal = "cpal"
stt = "stt"
llm = "llm"
byok = "byok"
hotkey = "hotkey"

[files]
extend-exclude = [
  "*.lock",
  "node_modules/",
  "target/",
  "dist/",
  "*.min.js",
  "*.min.css",
  "CHANGELOG.md",
  "README_it.md",
  "README_de.md",
  "README_id.md",
]

[default.extend-identifiers]
